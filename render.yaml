services:
  - type: web
    name: clinic-patient-manager
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: APP_USER
        value: admin
      - key: APP_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: AUTO_CLEAR_DAILY
        value: "true"
      - key: TZ_OFFSET_MINUTES
        value: "480"
    disk:
      name: patient-data
      mountPath: /var/data
      sizeGB: 1
