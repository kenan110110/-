services:
  - type: web
    name: clinic-patient-manager
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: APP_USER
        value: admin
      - key: APP_PASSWORD
        sync: false
      - key: AUTO_CLEAR_DAILY
        value: "true"
      - key: TZ_OFFSET_MINUTES
        value: "480"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: clinic_patient_days
